name: Auto Update Game Release

on:
  workflow_run:
    workflows: ["Upload Game Builds"]
    types:
      - completed

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Download uploaded builds
        uses: actions/download-artifact@v4
        with:
          name: game-builds
          path: builds
        continue-on-error: true

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Octokit
        run: npm install @octokit/rest

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-release.js

      - name: Commit updated index.json
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.json
          git commit -m "Auto-update index.json" || echo "No changes"
          git push

      - name: Clear builds folder
        run: rm -rf builds/*
