name: Auto Update Game Release

on:
  push:
    paths:
      - "builds/**"

permissions:
  contents: write

jobs:
  update-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install Octokit
        run: npm install @octokit/rest

      - name: Run updater
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: node .github/scripts/update-release.js

      - name: Commit updated index.json and clear builds
        run: |
          rm -rf builds/*
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index.json
          git add builds
          git commit -m "Auto-update releases + clear builds" || echo "No changes"
          git push
