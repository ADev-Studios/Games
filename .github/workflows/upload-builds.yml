name: Upload Game Builds

on:
  workflow_dispatch:        # REQUIRED for upload-builds.js to trigger this workflow
  push:
    paths:
      - "**"                # Also runs on any push (optional but useful)

jobs:
  upload-builds:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Upload builds folder (if exists)
        uses: actions/upload-artifact@v4
        with:
          name: game-builds
          path: builds/*
        continue-on-error: true
