<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADev Games Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-blue">

  <!-- HERO BANNER -->
  <header class="hero">
    <div class="hero-content">
      <h1>ADev Games Marketplace</h1>
      <p>Discover and download games created by ADev Studios</p>
    </div>

    <button id="theme-toggle" class="theme-btn">Switch Theme</button>
  </header>

  <!-- FEATURED SECTION -->
  <section class="featured-section">
    <h2 class="section-title">Featured</h2>
    <div id="featured-row" class="featured-row"></div>
  </section>

  <!-- ALL GAMES -->
  <section class="games-section">
    <h2 class="section-title">All Games</h2>
    <div id="game-grid" class="game-grid"></div>
  </section>

  <footer>
    <p>© 2026 ADev Studios</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
