<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>ADev Games Marketplace</title>
  <link rel="stylesheet" href="style.css">
</head>

<body class="theme-blue">

  <!-- ADev launcher-style header -->
  <header class="adev-header">
    <div class="logo">ADev</div>

    <nav class="nav">
      <a href="#" class="nav-item active">Marketplace</a>
      <a href="#" class="nav-item">Games</a>
      <a href="#" class="nav-item">About</a>
    </nav>

    <button id="theme-toggle" class="theme-btn">Dark Theme</button>
  </header>

  <!-- Hero banner -->
  <section class="hero">
    <div class="hero-bg"></div>
    <div class="hero-content">
      <h1>ADev Games Marketplace</h1>
      <p>Discover and download games created by ADev Studios</p>
    </div>
  </section>

  <!-- Featured row -->
  <section class="featured-section">
    <h2 class="section-title">Featured</h2>
    <div id="featured-row" class="featured-row"></div>
  </section>

  <!-- All games grid -->
  <section class="games-section">
    <h2 class="section-title">All Games</h2>
    <div id="game-grid" class="game-grid"></div>
  </section>

  <footer>
    <p>© 2026 ADev Studios</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
